# Server configuration
server.port=${PORT:8080}

# Cloud SQL Configuration
spring.cloud.gcp.sql.database-name=your_database_name
spring.cloud.gcp.sql.instance-connection-name=teamprojectmccewenseager:us-east1:your-instance-name
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.cloud.gcp.project-id=teamprojectmccewenseager

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2